<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="XW-GO 围棋自对弈训练AI - 支持中国规则，贴3¾子，基于强化学习自对弈训练">
    <meta name="theme-color" content="#0a0a0a">
    <meta property="og:title" content="XW-GO · 围棋自对弈训练AI">
    <meta property="og:description" content="围棋自对弈训练AI，支持9×9/13×13/19×19棋盘，强化学习自训练">
    <meta property="og:type" content="website">
    <title>XW-GO · 围棋自对弈训练AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <a href="#boardContainer" class="skip-link">跳到棋盘</a>
    <div class="app">
        <!-- 左侧：棋盘 -->
        <section class="board-panel">
            <div class="board-header">
                <h1 class="title">XW-GO</h1>
                <div class="subtitle">围棋自对弈训练 AI · 中国规则 · 贴3¾子</div>
            </div>

            <div class="board-container" id="boardContainer">
                <canvas id="board" width="640" height="640" aria-label="围棋棋盘，当前手数0，轮到黑方"></canvas>
                <div class="board-overlay" id="boardOverlay" aria-live="polite">
                    <div class="thinking" id="thinkingIndicator" role="status">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                        <span>AI 思考中...</span>
                    </div>
                </div>
            </div>

            <div class="board-status" role="status" aria-live="polite">
                <div class="status-item">
                    <span class="status-label">轮到</span>
                    <span class="status-value" id="turnIndicator">
                        <span class="stone-icon black" aria-hidden="true"></span>黑方
                    </span>
                </div>
                <div class="status-item">
                    <span class="status-label">手数</span>
                    <span class="status-value" id="moveCount">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">虚着</span>
                    <span class="status-value" id="passCount">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">棋盘</span>
                    <span class="status-value" id="boardSize">9×9</span>
                </div>
            </div>
        </section>

        <!-- 中间：控制 + 模式 -->
        <section class="control-panel" aria-label="控制面板">
            <div class="panel-card">
                <h3>对局模式</h3>
                <div class="mode-buttons" role="radiogroup" aria-label="对局模式选择">
                    <button class="mode-btn active" data-mode="human_ai" role="radio" aria-checked="true">
                        <span class="mode-icon" aria-hidden="true">👤</span>
                        <span class="mode-text">人类 vs AI</span>
                    </button>
                    <button class="mode-btn" data-mode="ai_ai_step" role="radio" aria-checked="false">
                        <span class="mode-icon" aria-hidden="true">🤖</span>
                        <span class="mode-text">AI 单步</span>
                    </button>
                    <button class="mode-btn" data-mode="ai_ai" role="radio" aria-checked="false">
                        <span class="mode-icon" aria-hidden="true">⚔️</span>
                        <span class="mode-text">AI 连续</span>
                    </button>
                    <button class="mode-btn" data-mode="ai_selfplay" role="radio" aria-checked="false">
                        <span class="mode-icon" aria-hidden="true">🧠</span>
                        <span class="mode-text">自对弈训练</span>
                    </button>
                </div>
            </div>

            <div class="panel-card">
                <h3>对局控制</h3>
                <div class="control-buttons">
                    <button class="btn primary" id="btnNewGame">🆕 新对局</button>
                    <button class="btn" id="btnReset">↻ 重置</button>
                    <button class="btn" id="btnPass">⏭ 虚着</button>
                    <button class="btn" id="btnAiMove">▶ AI 走一步</button>
                    <button class="btn danger" id="btnResign">🏳 认输</button>
                    <button class="btn" id="btnSaveSgf">💾 保存棋谱</button>
                </div>
                <div class="size-selector">
                    <label for="boardSizeSelect">棋盘:</label>
                    <select id="boardSizeSelect" aria-label="选择棋盘大小">
                        <option value="9" selected>9 × 9</option>
                        <option value="13">13 × 13</option>
                        <option value="19">19 × 19</option>
                    </select>
                    <label for="humanColorSelect">执子:</label>
                    <select id="humanColorSelect" aria-label="选择执子颜色">
                        <option value="1" selected>黑 (先手)</option>
                        <option value="2">白 (后手)</option>
                    </select>
                </div>
            </div>

            <div class="panel-card">
                <h3>训练控制</h3>
                <div class="train-config">
                    <label for="trainBatchSize">每批局数:</label>
                    <input type="number" id="trainBatchSize" value="10" min="1" max="10000" aria-label="每批训练局数">
                </div>
                <div class="control-buttons">
                    <button class="btn primary" id="btnTrainStart">🚀 开始训练</button>
                    <button class="btn danger" id="btnTrainStop">⏹ 停止训练</button>
                    <button class="btn" id="btnTrainStep">⚡ 训练1局</button>
                </div>
                <div class="train-progress" aria-label="训练进度" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar">
                        <div class="progress-fill" id="trainProgress"></div>
                    </div>
                </div>
            </div>

            <div class="panel-card hw-panel">
                <h3>
                    <span>🖥️ 硬件加速</span>
                    <button class="btn-mini" id="btnHwRefresh" title="重新检测硬件" aria-label="重新检测硬件">🔄</button>
                </h3>
                <div class="hw-summary" id="hwSummary">
                    <div class="hw-row">
                        <span class="hw-key">后端</span>
                        <span class="hw-val" id="hwBackend">检测中…</span>
                    </div>
                    <div class="hw-row">
                        <span class="hw-key">CPU</span>
                        <span class="hw-val" id="hwCpu">—</span>
                    </div>
                </div>
                <div class="hw-list" id="hwGpuList" aria-label="GPU 列表"></div>
                <div class="hw-list" id="hwNpuList" aria-label="NPU 列表"></div>
                <div class="hw-threads" id="hwThreads"></div>
            </div>

            <div class="panel-card">
                <h3>训练统计</h3>
                <div class="stat-grid">
                    <div class="stat-cell">
                        <div class="stat-label">总对局数</div>
                        <div class="stat-value" id="statTotalGames">0</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-label">当前阶段</div>
                        <div class="stat-value" id="statPhase">—</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-label">Q表状态数</div>
                        <div class="stat-value" id="statQStates">0</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-label">总访问次数</div>
                        <div class="stat-value" id="statVisits">0</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-label">近10局黑胜率</div>
                        <div class="stat-value" id="statBlackWinrate">—</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-label">近10局白胜率</div>
                        <div class="stat-value" id="statWhiteWinrate">—</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 右侧：分析 -->
        <section class="analysis-panel" aria-label="分析面板">
            <div class="panel-card">
                <h3>胜率趋势</h3>
                <div class="chart-container">
                    <canvas id="winrateChart" aria-label="胜率趋势图"></canvas>
                </div>
            </div>

            <div class="panel-card">
                <h3>当前对局分析</h3>
                <button class="btn block" id="btnAnalyze">🔍 请求分析</button>
                <div class="analysis-output" id="analysisOutput" aria-live="polite">
                    <div class="analysis-empty">点击"请求分析"查看详情</div>
                </div>
            </div>

            <div class="panel-card">
                <h3>棋谱列表</h3>
                <div class="move-list-container">
                    <div class="move-list" id="moveList" aria-label="落子记录">
                        <div class="move-empty">暂无落子</div>
                    </div>
                </div>
            </div>

            <div class="panel-card">
                <h3>热键</h3>
                <div class="hotkey-list" aria-label="快捷键列表">
                    <div><kbd>空格</kbd> AI 走一步</div>
                    <div><kbd>P</kbd> 虚着</div>
                    <div><kbd>R</kbd> 重置</div>
                    <div><kbd>N</kbd> 新对局</div>
                    <div><kbd>A</kbd> 分析</div>
                </div>
            </div>
        </section>
    </div>

    <!-- 终局弹窗 -->
    <div class="modal" id="gameOverModal" role="dialog" aria-modal="true" aria-label="棋局终了">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🏆 棋局终了</h2>
                <button class="modal-close" id="modalCloseBtn" aria-label="关闭">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

    <script src="/static/js/main.js"></script>
</body>
</html>
